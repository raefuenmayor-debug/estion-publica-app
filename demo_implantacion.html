<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoGestión - Prueba en Vivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        monday: { gray: "#C4C4C4", yellow: "#FDAB3D", orange: "#E2445C", green: "#00C875", blue: "#579BFC" }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 font-sans antialiased h-screen flex overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-[#292f4c] text-white flex flex-col">
        <div class="h-16 flex items-center px-6 border-b border-white/10">
            <span class="text-xl font-black tracking-tight flex items-center gap-2">
                <div class="w-4 h-4 rounded bg-monday-yellow"></div>
                <div class="w-4 h-4 rounded bg-monday-green -ml-4 mt-4"></div>
                GeoGestión
            </span>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a href="#" class="flex items-center gap-3 px-3 py-2 bg-white/10 rounded-lg text-sm font-medium">Tablero Principal</a>
            <a href="#" class="flex items-center gap-3 px-3 py-2 text-white/50 text-sm font-medium">Usuarios y Roles</a>
            <a href="#" class="flex items-center gap-3 px-3 py-2 text-white/50 text-sm font-medium">Inventario Bienes</a>
        </nav>
        <div class="p-4 border-t border-white/10 flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-purple-500 to-blue-500 flex items-center justify-center text-sm font-bold">A</div>
            <div class="flex flex-col"><span class="text-sm font-medium">Admin Total</span></div>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col bg-white rounded-tl-2xl shadow-xl ml-[-10px] z-10">
        <header class="h-16 flex items-center justify-between px-8 border-b border-gray-100">
            <h1 class="text-2xl font-bold text-slate-800">Contrataciones Públicas</h1>
            <button class="px-4 py-2 bg-monday-green text-white text-sm font-medium rounded-md shadow-sm">Nueva Tarea</button>
        </header>
        
        <div class="flex-1 p-8 bg-[#F4F5f7] overflow-auto">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200">
                <div class="px-2 py-3 flex items-center border-b-[3px] border-b-monday-blue">
                    <h2 class="text-monday-blue font-semibold text-lg ml-2 flex-1">Procesos de Licitación 2024</h2>
                </div>
                <!-- Rows -->
                <div class="flex w-full group hover:bg-gray-50 border-b border-gray-100 leading-[3rem]">
                    <div class="w-[5px] bg-monday-blue"></div>
                    <div class="flex-1 px-4 font-medium text-slate-800">1. Solicitud de la unidad usuaria</div>
                    <div class="w-[140px] px-3 flex items-center justify-center">
                        <div class="w-8 h-8 rounded-full bg-purple-500 text-center text-white text-xs font-bold leading-8">LF</div>
                    </div>
                    <div class="w-[160px] bg-monday-green text-white font-semibold text-center flex items-center justify-center cursor-pointer hover:opacity-90 transition-opacity" onclick="alert('Cambio de estado guardado en Supabase')">Culminada</div>
                    <div class="w-[120px] text-center text-sm text-gray-600">15 Mar</div>
                    <div class="w-[150px] flex items-center justify-center">
                        <button class="p-1.5 text-monday-green bg-monday-green/10 rounded-md" onclick="alert('Abriendo previsualizador de PDF verificado...')">Archivos</button>
                    </div>
                </div>
                <div class="flex w-full group hover:bg-gray-50 border-b border-gray-100 leading-[3rem]">
                    <div class="w-[5px] bg-monday-blue"></div>
                    <div class="flex-1 px-4 font-medium text-slate-800">2. Documento Autorización / Acta</div>
                    <div class="w-[140px] px-3 flex items-center justify-center">
                        <div class="w-8 h-8 rounded-full bg-blue-500 text-center text-white text-xs font-bold leading-8">RF</div>
                    </div>
                    <div class="w-[160px] bg-monday-orange text-white font-semibold text-center flex items-center justify-center">En Revisión</div>
                    <div class="w-[120px] text-center text-sm text-gray-600">18 Mar</div>
                    <div class="w-[150px] flex items-center justify-center">
                        <button class="text-xs font-semibold px-2 py-1 border shadow-sm rounded border-gray-200 text-gray-700 hover:bg-gray-50" onclick="alert('Aprobando tarea... Cambiando a estado Culminada')">Validar PDF</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
